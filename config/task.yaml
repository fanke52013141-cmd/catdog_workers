content_strategy:
  positioning: "用 AI 制作的虚拟打工人日常，不以 AI 炫技为账号核心卖点"
  tone:
    - "可爱"
    - "真实"
    - "疲惫"
    - "好笑"
    - "治愈"
  target_audience:
    - "22-35 岁上班族"
    - "有内耗、疲惫、加班、下班续命共鸣的人"
    - "喜欢虚拟 IP、表情包、轻剧情短视频的人"
  initial_columns:
    - "呼噜噜看热点"
    - "呼噜噜的怪早晨"
    - "打工喵生存报告"
    - "呼噜噜与啊呜呜"
  column_strategy:
    priority: "热点优先，热点是流量入口；打工人生活是长期人设底盘；魔幻早晨是 AI 视觉差异化；啊呜呜负责朋友关系和对手戏。"
    hot_topic_principle: "不是呼噜噜去蹭热点，而是热点经过呼噜噜，变成打工人的情绪表达。优先选择打工人关心、能转译成低电量情绪、且有 AI 视觉化空间的热点。热点表达形式不固化，根据热点选择最合适的表达。"
    recommended_ratio:
      hululu_hot_take: "40%"
      strange_morning: "25%"
      worker_life: "20%"
      hululu_awuwu: "15%"
    principle: "热点可以进入所有栏目，但必须被翻译成打工人情绪和呼噜噜的人设反应，不能为了蹭热点牺牲 IP。"

production:
  visual_style: "3D 毛绒动画风"
  visual_style_notes: "软软的毛绒玩具质感，保留打工人的疲惫、低电量和一点丧感，不做精致女神化。"
  target_duration_seconds:
    min: 15
    recommended_max: 45
    hard_max: 60
  duration_principle: "每条视频控制在 1 分钟以内；优先保证完播率和信息密度，普通内容建议 15-45 秒，热点或魔幻特效内容也不超过 60 秒。"
  video_structure:
    hook_seconds: "0-3"
    conflict_seconds: "4-15"
    escalation_seconds: "16-40"
    tag_seconds: "41-60"
  default_aspect_ratio: "9:16"
  default_publish_frequency: "待确认"
  generation_tools:
    image: "待确认"
    video: "待确认"
    voice: "待确认"
    editing: "待确认"

monetization:
